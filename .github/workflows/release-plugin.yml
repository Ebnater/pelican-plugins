name: Release Plugin

on:
  workflow_dispatch:
    inputs:
      plugin_id:
        description: 'Plugin ID (folder name, e.g. backup-templates)'
        required: true
        type: string
      version:
        description: 'Version number in SemVer format (e.g., 1.0.2)'
        required: true
        type: string

jobs:
  validate:
    name: Validate inputs
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.check.outputs.tag_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate inputs and check preconditions
        id: check
        run: |
          plugin_id="${{ github.event.inputs.plugin_id }}"
          version="${{ github.event.inputs.version }}"

          if [ ! -d "$plugin_id" ]; then
            echo "::error::Plugin directory '$plugin_id' does not exist."
            exit 1
          fi

          if [ ! -f "$plugin_id/plugin.json" ]; then
            echo "::error::No plugin.json found in '$plugin_id'."
            exit 1
          fi

          if ! echo "$version" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version '$version' is not valid SemVer. Expected format: X.Y.Z"
            exit 1
          fi

          tag_name="${plugin_id}-${version}"
          if git tag --list | grep -qx "$tag_name"; then
            echo "::error::Tag '$tag_name' already exists."
            exit 1
          fi

          echo "tag_name=$tag_name" >> $GITHUB_OUTPUT

  lint:
    name: Lint
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer:v2
          coverage: none

      - name: Install Laravel Pint
        run: |
          composer init --no-interaction
          composer require "laravel/pint:^1.28"

      - name: Run Pint
        run: vendor/bin/pint --test

  release:
    name: Release
    needs: [validate, lint]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog
        run: |
          plugin_id="${{ github.event.inputs.plugin_id }}"
          last_tag=$(git tag --list "${plugin_id}-*" --sort=-version:refname | head -n1)
          if [ -n "$last_tag" ]; then
            log=$(git log "${last_tag}..HEAD" --pretty=format:"- %s" -- "$plugin_id/")
          else
            log=$(git log --pretty=format:"- %s" -- "$plugin_id/")
          fi
          if [ -z "$log" ]; then
            log="- Initial release"
          fi
          echo "$log" > CHANGELOG_NOTES.md

      - name: Update plugin.json and update.json
        run: |
          plugin_id="${{ github.event.inputs.plugin_id }}"
          version="${{ github.event.inputs.version }}"
          tag_name="${{ needs.validate.outputs.tag_name }}"
          zip_url="https://github.com/${{ github.repository }}/releases/download/${tag_name}/${tag_name}.zip"

          jq --arg v "$version" '.version = $v' "$plugin_id/plugin.json" > tmp.json && mv tmp.json "$plugin_id/plugin.json"
          jq --arg v "$version" --arg url "$zip_url" '.["*"].version = $v | .["*"].download_url = $url' "$plugin_id/update.json" > tmp.json && mv tmp.json "$plugin_id/update.json"

      - name: Commit version updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit (versions already up to date)."
          else
            git commit -m "chore: release ${{ github.event.inputs.plugin_id }} v${{ github.event.inputs.version }}"
            git push
          fi

      - name: Create zip archive
        run: |
          plugin_id="${{ github.event.inputs.plugin_id }}"
          tag_name="${{ needs.validate.outputs.tag_name }}"
          cd "$plugin_id"
          zip -r "../${tag_name}.zip" . -x "*.git*"
          cd ..

      - name: Create GitHub Release
        run: |
          tag_name="${{ needs.validate.outputs.tag_name }}"
          plugin_id="${{ github.event.inputs.plugin_id }}"
          version="${{ github.event.inputs.version }}"
          gh release create "$tag_name" \
            --title "$plugin_id v$version" \
            --notes-file CHANGELOG_NOTES.md \
            "${tag_name}.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
