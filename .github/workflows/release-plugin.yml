name: Release Plugin

on:
  workflow_dispatch:
    inputs:
      plugin_id:
        description: 'Plugin ID (folder name, e.g. backup-templates)'
        required: true
        type: string
      version:
        description: 'Version number in SemVer format (e.g., 1.0.2)'
        required: true
        type: string

jobs:
  validate:
    name: Validate inputs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag_name: ${{ steps.check.outputs.tag_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate inputs and check preconditions
        id: check
        run: |
          plugin_id="${{ github.event.inputs.plugin_id }}"
          version="${{ github.event.inputs.version }}"

          if [ ! -d "$plugin_id" ]; then
            echo "::error::Plugin directory '$plugin_id' does not exist."
            exit 1
          fi

          if [ ! -f "$plugin_id/plugin.json" ]; then
            echo "::error::No plugin.json found in '$plugin_id'."
            exit 1
          fi

          if ! echo "$version" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version '$version' is not valid SemVer. Expected format: X.Y.Z"
            exit 1
          fi

          tag_name="${plugin_id}-${version}"
          if git tag --list | grep -qx "$tag_name"; then
            echo "::error::Tag '$tag_name' already exists."
            exit 1
          fi

          echo "tag_name=$tag_name" >> $GITHUB_OUTPUT

  lint:
    name: Lint
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer:v2
          coverage: none

      - name: Install Laravel Pint
        run: |
          composer init --no-interaction
          composer require "laravel/pint:^1.28"

      - name: Run Pint
        run: vendor/bin/pint --test

  release:
    name: Release
    needs: [validate, lint]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog
        shell: bash
        run: |
          plugin_id="${{ github.event.inputs.plugin_id }}"
          version="${{ github.event.inputs.version }}"
          repo="${{ github.repository }}"
          last_tag=$(git tag --list "${plugin_id}-*" --sort=-version:refname | head -n1)
          range_arg=""
          if [ -n "$last_tag" ]; then
            range_arg="${last_tag}..HEAD"
          fi

          # Collect commits: "hash subject" lines
          commits=$(git log "$range_arg" --pretty=format:"%H %s" -- "$plugin_id/")

          declare -A sections
          sections[feat]=""
          sections[fix]=""
          sections[perf]=""
          sections[refactor]=""
          sections[other]=""

          while IFS= read -r line; do
            [ -z "$line" ] && continue
            hash=$(echo "$line" | cut -d' ' -f1)
            subject=$(echo "$line" | cut -d' ' -f2-)
            short_hash=${hash:0:7}
            commit_url="https://github.com/${repo}/commit/${hash}"
            entry="- ${subject} ([${short_hash}](${commit_url}))"

            if echo "$subject" | grep -qiE '^feat(\(.+\))?!?:'; then
              sections[feat]+="${entry}"$'\n'
            elif echo "$subject" | grep -qiE '^fix(\(.+\))?!?:'; then
              sections[fix]+="${entry}"$'\n'
            elif echo "$subject" | grep -qiE '^perf(\(.+\))?!?:'; then
              sections[perf]+="${entry}"$'\n'
            elif echo "$subject" | grep -qiE '^refactor(\(.+\))?!?:'; then
              sections[refactor]+="${entry}"$'\n'
            elif echo "$subject" | grep -qiE '^(chore|docs|style|test|ci|build)(\(.+\))?!?:'; then
              : # skip maintenance commits from release notes
            else
              sections[other]+="${entry}"$'\n'
            fi
          done <<< "$commits"

          {
            echo "## What's Changed"
            echo ""

            if [ -n "${sections[feat]}" ]; then
              echo "### ✨ New Features"
              printf '%s' "${sections[feat]}"
              echo ""
            fi
            if [ -n "${sections[fix]}" ]; then
              echo "### 🐛 Bug Fixes"
              printf '%s' "${sections[fix]}"
              echo ""
            fi
            if [ -n "${sections[perf]}" ]; then
              echo "### ⚡ Performance Improvements"
              printf '%s' "${sections[perf]}"
              echo ""
            fi
            if [ -n "${sections[refactor]}" ]; then
              echo "### ♻️ Refactoring"
              printf '%s' "${sections[refactor]}"
              echo ""
            fi
            if [ -n "${sections[other]}" ]; then
              echo "### 🔀 Other Changes"
              printf '%s' "${sections[other]}"
              echo ""
            fi

            if [ -z "${sections[feat]}${sections[fix]}${sections[perf]}${sections[refactor]}${sections[other]}" ]; then
              echo "_No user-facing changes in this release._"
              echo ""
            fi

            if [ -n "$last_tag" ]; then
              echo "**Full Changelog**: https://github.com/${repo}/compare/${last_tag}...${plugin_id}-${version}"
            else
              echo "**Full Changelog**: https://github.com/${repo}/commits/${plugin_id}-${version}"
            fi
          } > CHANGELOG_NOTES.md

      - name: Update plugin.json and update.json
        run: |
          plugin_id="${{ github.event.inputs.plugin_id }}"
          version="${{ github.event.inputs.version }}"
          tag_name="${{ needs.validate.outputs.tag_name }}"
          zip_url="https://github.com/${{ github.repository }}/releases/download/${tag_name}/${tag_name}.zip"

          jq --arg v "$version" '.version = $v' "$plugin_id/plugin.json" > tmp.json && mv tmp.json "$plugin_id/plugin.json"
          jq --arg v "$version" --arg url "$zip_url" '.["*"].version = $v | .["*"].download_url = $url' "$plugin_id/update.json" > tmp.json && mv tmp.json "$plugin_id/update.json"

      - name: Commit version updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit (versions already up to date)."
          else
            git commit -m "chore: release ${{ github.event.inputs.plugin_id }} v${{ github.event.inputs.version }}"
            git push
          fi

      - name: Create zip archive
        run: |
          plugin_id="${{ github.event.inputs.plugin_id }}"
          tag_name="${{ needs.validate.outputs.tag_name }}"
          cd "$plugin_id"
          zip -r "../${tag_name}.zip" . -x "*.git*"
          cd ..

      - name: Create GitHub Release
        run: |
          tag_name="${{ needs.validate.outputs.tag_name }}"
          plugin_id="${{ github.event.inputs.plugin_id }}"
          version="${{ github.event.inputs.version }}"
          gh release create "$tag_name" \
            --title "$plugin_id v$version" \
            --notes-file CHANGELOG_NOTES.md \
            "${tag_name}.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
