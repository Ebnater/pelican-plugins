name: Release Plugin

on:
  workflow_dispatch:
    inputs:
      plugin_id:
        description: 'Plugin to release'
        required: true
        type: choice
        options:
          - backup-templates
          - pocketid-provider
      version:
        description: 'Version number (e.g., 1.0.1)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Process plugin
        id: process
        run: |
          plugin_dir="${{ github.event.inputs.plugin_id }}"
          version="${{ github.event.inputs.version }}"

          # Read plugin.json to get the ID
          plugin_id=$(jq -r '.id' "$plugin_dir/plugin.json")

          # Generate zip URL
          artifact_name="${plugin_id}-${version}"
          zip_url="https://github.com/${{ github.repository }}/releases/download/${artifact_name}/${artifact_name}.zip"

          echo "Releasing $plugin_id version $version"
          echo "plugin_id=$plugin_id" >> $GITHUB_OUTPUT
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "zip_url=$zip_url" >> $GITHUB_OUTPUT

      - name: Create release and upload assets
        run: |
          plugin_dir="${{ github.event.inputs.plugin_id }}"
          plugin_id="${{ steps.process.outputs.plugin_id }}"
          version="${{ steps.process.outputs.version }}"
          zip_url="${{ steps.process.outputs.zip_url }}"

          echo "Creating release for $plugin_id version $version"

          # Create zip file
          zip_name="${plugin_id}-${version}.zip"
          cd "$plugin_dir"
          zip -r "../$zip_name" . -x "*.git*"
          cd ..

          # Create release tag
          tag_name="${plugin_id}-${version}"

          # Create GitHub release
          gh release create "$tag_name" \
            --title "$plugin_id v$version" \
            --notes "Release of $plugin_id version $version" \
            "$zip_name"

          echo "Release created: $tag_name"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
